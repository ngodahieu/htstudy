<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Teacher Dashboard</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="../css/dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="dashboard">

<aside class="sidebar">

<div class="sidebar-logo">

<img src="../assets/images/logo.png">

<h2>H&T STUDY</h2>

</div>

<div class="sidebar-user">

<img
id="teacherAvatar"
src="../assets/avatars/default.jpg">

<h3 id="teacherName">

Đang tải...

</h3>

<p id="teacherRole">

Giáo viên

</p>

</div>

<div class="sidebar-menu">

<button
class="menu-item active"
id="menuHome">

<i class="fa-solid fa-house"></i>

Trang chủ

</button>
<button
class="menu-item"
id="menuStudents">

<i class="fa-solid fa-users"></i>

Học sinh

</button>

<button
class="menu-item">

<i class="fa-solid fa-book"></i>

Khóa học

</button>

<button
class="menu-item">

<i class="fa-solid fa-video"></i>

Video

</button>

<button
class="menu-item">

<i class="fa-solid fa-file-pdf"></i>

Tài liệu

</button>

<button
class="menu-item">

<i class="fa-solid fa-file-circle-check"></i>

Bài kiểm tra

</button>

<button
class="menu-item">

<i class="fa-solid fa-bullhorn"></i>

Thông báo

</button>

<button
class="menu-item"
id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

Đăng xuất

</button>

</div>

</aside>

<main class="dashboard-content">

<div class="dashboard-header">

<h1>

Xin chào Giáo viên 👋

</h1>

<p>

Chúc bạn có một ngày làm việc hiệu quả.

</p>

</div>

<div class="dashboard-cards">

<div class="dashboard-card">

<h2 id="studentCount">

0

</h2>

<p>

Học sinh

</p>

</div>

<div class="dashboard-card">

<h2 id="courseCount">

0

</h2>

<p>

Khóa học

</p>

</div>

<div class="dashboard-card">

<h2 id="videoCount">

0

</h2>

<p>

Video

</p>

</div>

<div class="dashboard-card">

<h2 id="documentCount">

0

</h2>

<p>

Tài liệu

</p>

</div>

</div>
<div
id="studentPage"
style="display:none;">

    <div class="dashboard-header">

        <h1>

            Tạo tài khoản học sinh

        </h1>

    </div>

    <div class="dashboard-form">

        <div class="form-group">

            <label>

                Họ và tên

            </label>

            <input
            type="text"
            id="studentName">

        </div>

        <div class="form-group">

            <label>

                Email

            </label>

            <input
            type="email"
            id="studentEmail">

        </div>

        <div class="form-group">

    <label>

        Mã học sinh

    </label>

    <input
    type="text"
    id="studentId"
    readonly>

    <small class="auto-text">

        Hệ thống sẽ tự tạo mã học sinh.

    </small>

</div>

        <button
        id="createStudentBtn">

            Tạo tài khoản

        </button>

    </div>

</div>
</main>

</div>

<script
type="module"
src="../js/teacher.js">

</script>

</body>

</html>
